name: 'Deploy to Caprover Using GitHub Actions'
description: 'Deploys your GitHub Repo to CapRover'
branding:
  icon: 'arrow-right'
  color: orange
inputs:
  server:
    description: 'The URL to your caprover e.g captain.your-domain.com'
    required: true
  password:
    description: 'Your Caprover login password (ignored when app_token is set; omit password and use app_token for CapRover Pro with OTP/2FA)'
    required: false
    default: ''
  app_token:
    description: 'CapRover app token from the Deployment tab. Use this for CapRover Pro when OTP/2FA is enabled instead of password-based deploy.'
    required: false
    default: ''
  appName:
    description: 'The name of the app on Caprover'
    required: true
  branch:
    description: 'The GitHub Repo branch to deploy'
    required: false
  image:
    description: 'The Docker image to deploy'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.server }}
    - ${{ inputs.password }}
    - ${{ inputs.app_token }}
    - ${{ inputs.appName }}
    - ${{ inputs.branch }}
    - ${{ inputs.image }}