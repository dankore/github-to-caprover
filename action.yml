name: 'Deploy to CapRover Using GitHub Actions'
author: 'Dan Kore'
description: 'Deploy Docker images or branches to CapRover from GitHub Actions, with password or app_token support for OTP/2FA setups.'
branding:
  icon: 'upload-cloud'
  color: blue
inputs:
  server:
    description: 'The URL to your CapRover server e.g captain.your-domain.com'
    required: true
  password:
    description: 'Your Caprover login password (ignored when app_token is set; omit password and use app_token for CapRover Pro with OTP/2FA)'
    required: false
    default: ''
  app_token:
    description: 'CapRover app token from the Deployment tab. Use this for CapRover Pro when OTP/2FA is enabled instead of password-based deploy.'
    required: false
    default: ''
  appName:
    description: 'The name of the app on Caprover'
    required: true
  branch:
    description: 'The GitHub Repo branch to deploy'
    required: false
  image:
    description: 'The Docker image to deploy'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - ${{ inputs.server }}
    - ${{ inputs.password }}
    - ${{ inputs.app_token }}
    - ${{ inputs.appName }}
    - ${{ inputs.branch }}
    - ${{ inputs.image }}